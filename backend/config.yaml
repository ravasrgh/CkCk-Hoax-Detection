data:
  label_column: label
  max_samples: null
  test_path: test_data/test.csv
  test_split: 0.1
  text_column: clean_text
  title_column: judul
  train_dir: train_data
  train_files:
  - Cleaned_TurnBackHoax_v3.csv
  - Cleaned_Antaranews_v1.csv
  - Cleaned_Detik_v2.csv
  - Cleaned_Kompas_v2.csv
  val_split: 0.15
inference:
  batch_size: 8
  confidence_threshold: 0.5
  device: cpu
  model_path: models/best_model.pt
  use_onnx: true
model:
  dropout: 0.1
  max_length: 256
  name: indobenchmark/indobert-base-p2
  num_labels: 2
paths:
  logs: logs
  model_dir: models
  test_data: test_data
  train_data: train_data
pii_filter:
  enabled: true
  mask_char: █
  types:
  - nik
  - phone
  - email
  - bank_account
  - npwp
  - passport
test_key: test_value
training:
  batch_size: 16
  epochs: 5
  eval_steps: 100
  fp16: false
  learning_rate: 2.0e-05
  save_steps: 500
  seed: 42
  version: v4
  warmup_ratio: 0.1
  weight_decay: 0.01
